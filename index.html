<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowers for Steph 💐</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Quicksand:wght@300;400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 30%, #16213e 60%, #0a0a1a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
        }

        /* Fireflies */
        .firefly {
            position: fixed;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #ffd700;
            box-shadow: 0 0 6px 2px rgba(255, 215, 0, 0.6), 0 0 15px 5px rgba(255, 215, 0, 0.3);
            animation: float-firefly 8s ease-in-out infinite;
            opacity: 0;
        }

        .firefly:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; animation-duration: 7s; }
        .firefly:nth-child(2) { left: 80%; top: 30%; animation-delay: 1.5s; animation-duration: 9s; }
        .firefly:nth-child(3) { left: 50%; top: 60%; animation-delay: 3s; animation-duration: 6s; }
        .firefly:nth-child(4) { left: 30%; top: 70%; animation-delay: 2s; animation-duration: 10s; }
        .firefly:nth-child(5) { left: 70%; top: 15%; animation-delay: 4s; animation-duration: 8s; }
        .firefly:nth-child(6) { left: 15%; top: 50%; animation-delay: 5s; animation-duration: 7s; }
        .firefly:nth-child(7) { left: 85%; top: 65%; animation-delay: 1s; animation-duration: 11s; }
        .firefly:nth-child(8) { left: 45%; top: 10%; animation-delay: 3.5s; animation-duration: 9s; }
        .firefly:nth-child(9) { left: 60%; top: 80%; animation-delay: 6s; animation-duration: 8s; }
        .firefly:nth-child(10) { left: 25%; top: 40%; animation-delay: 2.5s; animation-duration: 7.5s; }

        @keyframes float-firefly {
            0%, 100% { opacity: 0; transform: translate(0, 0); }
            20% { opacity: 1; }
            50% { opacity: 0.6; transform: translate(30px, -40px); }
            80% { opacity: 1; }
        }

        /* Stars */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        .star:nth-child(1) { top: 5%; left: 15%; animation-delay: 0s; }
        .star:nth-child(2) { top: 12%; left: 45%; animation-delay: 0.5s; width: 3px; height: 3px; }
        .star:nth-child(3) { top: 8%; left: 75%; animation-delay: 1s; }
        .star:nth-child(4) { top: 18%; left: 90%; animation-delay: 1.5s; }
        .star:nth-child(5) { top: 3%; left: 55%; animation-delay: 2s; width: 3px; height: 3px; }
        .star:nth-child(6) { top: 15%; left: 25%; animation-delay: 0.8s; }
        .star:nth-child(7) { top: 7%; left: 65%; animation-delay: 1.2s; }
        .star:nth-child(8) { top: 20%; left: 35%; animation-delay: 2.5s; }
        .star:nth-child(9) { top: 2%; left: 85%; animation-delay: 0.3s; width: 3px; height: 3px; }
        .star:nth-child(10) { top: 10%; left: 5%; animation-delay: 1.8s; }
        .star:nth-child(11) { top: 22%; left: 50%; animation-delay: 3s; }
        .star:nth-child(12) { top: 6%; left: 95%; animation-delay: 0.7s; }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .scene {
            position: relative;
            width: 500px;
            height: 650px;
            margin-top: 20px;
        }

        /* Wrapper paper / bouquet wrap */
        .wrap {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            height: 260px;
            z-index: 10;
        }

        .wrap-paper {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 240px;
            background: linear-gradient(135deg, #f5e6d3, #e8d5c4);
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
            border-radius: 0 0 5px 5px;
            box-shadow: inset -15px 0 30px rgba(0,0,0,0.08), inset 15px 0 30px rgba(255,255,255,0.3);
        }

        .wrap-paper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 100%;
            background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
        }

        .wrap-fold-left {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-75%);
            width: 120px;
            height: 220px;
            background: linear-gradient(135deg, #ede0d4, #ddd0c0);
            clip-path: polygon(40% 0%, 100% 0%, 100% 100%, 0% 100%);
            z-index: 1;
        }

        .wrap-fold-right {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-25%);
            width: 120px;
            height: 220px;
            background: linear-gradient(135deg, #f0e3d6, #e5d8cb);
            clip-path: polygon(0% 0%, 60% 0%, 100% 100%, 0% 100%);
            z-index: 2;
        }

        /* Ribbon / bow */
        .ribbon {
            position: absolute;
            bottom: 160px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
        }

        .ribbon-knot {
            width: 24px;
            height: 20px;
            background: linear-gradient(135deg, #e74c6f, #c44569);
            border-radius: 3px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .ribbon-left, .ribbon-right {
            position: absolute;
            top: 8px;
            width: 35px;
            height: 50px;
            z-index: 1;
        }

        .ribbon-left {
            right: 50%;
            background: linear-gradient(135deg, #e74c6f, #c44569);
            clip-path: polygon(100% 0%, 100% 20%, 30% 50%, 100% 100%, 60% 100%, 0% 50%, 60% 0%);
            transform: rotate(-5deg);
        }

        .ribbon-right {
            left: 50%;
            background: linear-gradient(135deg, #c44569, #e74c6f);
            clip-path: polygon(0% 0%, 40% 0%, 100% 50%, 40% 100%, 0% 100%, 70% 50%, 0% 20%);
            transform: rotate(5deg);
        }

        .ribbon-tail-left, .ribbon-tail-right {
            position: absolute;
            top: 45px;
            width: 8px;
            height: 60px;
            z-index: 0;
        }

        .ribbon-tail-left {
            right: 60%;
            background: linear-gradient(to bottom, #c44569, #e74c6f);
            transform: rotate(10deg);
            clip-path: polygon(0% 0%, 100% 0%, 100% 80%, 50% 100%, 0% 80%);
        }

        .ribbon-tail-right {
            left: 60%;
            background: linear-gradient(to bottom, #e74c6f, #c44569);
            transform: rotate(-10deg);
            clip-path: polygon(0% 0%, 100% 0%, 100% 80%, 50% 100%, 0% 80%);
        }

        /* Stems */
        .stems {
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 200px;
            z-index: 5;
        }

        .stem {
            position: absolute;
            bottom: 0;
            width: 4px;
            background: linear-gradient(to top, #2d5016, #4a8c2a);
            border-radius: 2px;
            transform-origin: bottom center;
        }

        .stem:nth-child(1) { left: 50%; height: 200px; transform: translateX(-50%) rotate(-2deg); }
        .stem:nth-child(2) { left: 45%; height: 190px; transform: translateX(-50%) rotate(-15deg); }
        .stem:nth-child(3) { left: 55%; height: 185px; transform: translateX(-50%) rotate(12deg); }
        .stem:nth-child(4) { left: 40%; height: 175px; transform: translateX(-50%) rotate(-25deg); }
        .stem:nth-child(5) { left: 60%; height: 178px; transform: translateX(-50%) rotate(22deg); }
        .stem:nth-child(6) { left: 35%; height: 165px; transform: translateX(-50%) rotate(-35deg); }
        .stem:nth-child(7) { left: 65%; height: 168px; transform: translateX(-50%) rotate(33deg); }

        /* Leaves on stems */
        .leaf {
            position: absolute;
            width: 30px;
            height: 12px;
            background: linear-gradient(135deg, #4a8c2a, #2d5016);
            border-radius: 0 50% 50% 0;
            transform-origin: left center;
        }

        .stem:nth-child(1) .leaf { bottom: 60px; left: 4px; transform: rotate(-30deg); }
        .stem:nth-child(2) .leaf { bottom: 50px; right: 4px; left: auto; transform: rotate(25deg) scaleX(-1); }
        .stem:nth-child(3) .leaf { bottom: 55px; left: 4px; transform: rotate(-35deg); }
        .stem:nth-child(5) .leaf { bottom: 45px; right: 4px; left: auto; transform: rotate(20deg) scaleX(-1); }
        .stem:nth-child(6) .leaf { bottom: 40px; left: 4px; transform: rotate(-25deg); }

        /* Flowers container */
        .flowers {
            position: absolute;
            bottom: 340px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 280px;
            z-index: 8;
        }

        /* Rose */
        .rose {
            position: absolute;
            width: 60px;
            height: 60px;
            animation: bloom 2s ease-out forwards, gentle-sway 4s ease-in-out infinite;
            transform: scale(0);
        }

        .rose-petal {
            position: absolute;
            border-radius: 50% 50% 50% 50%;
            transform-origin: center bottom;
        }

        /* Rose 1 - Center, large red */
        .rose1 { top: 30px; left: 50%; transform: translateX(-50%) scale(0); animation-delay: 0.5s; }
        .rose1 .rose-petal:nth-child(1) { width: 25px; height: 30px; background: radial-gradient(ellipse at 50% 30%, #ff6b8a, #e8425a); top: 8px; left: 18px; transform: rotate(0deg); }
        .rose1 .rose-petal:nth-child(2) { width: 28px; height: 32px; background: radial-gradient(ellipse at 50% 30%, #ff5277, #d63652); top: 5px; left: 5px; transform: rotate(-30deg); }
        .rose1 .rose-petal:nth-child(3) { width: 28px; height: 32px; background: radial-gradient(ellipse at 50% 30%, #ff4d72, #cc304c); top: 5px; left: 28px; transform: rotate(30deg); }
        .rose1 .rose-petal:nth-child(4) { width: 32px; height: 35px; background: radial-gradient(ellipse at 50% 40%, #e8425a, #b8283e); top: 10px; left: 0px; transform: rotate(-50deg); }
        .rose1 .rose-petal:nth-child(5) { width: 32px; height: 35px; background: radial-gradient(ellipse at 50% 40%, #e8425a, #b8283e); top: 10px; left: 28px; transform: rotate(50deg); }
        .rose1 .rose-petal:nth-child(6) { width: 20px; height: 22px; background: radial-gradient(ellipse at 50% 30%, #ff8da5, #ff6b8a); top: 12px; left: 20px; transform: rotate(5deg); border-radius: 50%; }
        .rose1 .rose-center { position: absolute; width: 12px; height: 12px; background: radial-gradient(circle, #ff3355, #cc1133); border-radius: 50%; top: 18px; left: 24px; box-shadow: inset 2px 2px 4px rgba(0,0,0,0.3); }

        /* Rose 2 - Pink */
        .rose2 { top: 50px; left: 30%; transform: translateX(-50%) scale(0); animation-delay: 0.8s; }
        .rose2 .rose-petal:nth-child(1) { width: 22px; height: 26px; background: radial-gradient(ellipse at 50% 30%, #ffb6c1, #ff91a4); top: 8px; left: 16px; }
        .rose2 .rose-petal:nth-child(2) { width: 25px; height: 28px; background: radial-gradient(ellipse at 50% 30%, #ffa0b4, #ff7d95); top: 5px; left: 5px; transform: rotate(-25deg); }
        .rose2 .rose-petal:nth-child(3) { width: 25px; height: 28px; background: radial-gradient(ellipse at 50% 30%, #ffa0b4, #ff7d95); top: 5px; left: 25px; transform: rotate(25deg); }
        .rose2 .rose-petal:nth-child(4) { width: 28px; height: 30px; background: radial-gradient(ellipse at 50% 40%, #ff7d95, #e86b82); top: 10px; left: 0px; transform: rotate(-45deg); }
        .rose2 .rose-petal:nth-child(5) { width: 28px; height: 30px; background: radial-gradient(ellipse at 50% 40%, #ff7d95, #e86b82); top: 10px; left: 25px; transform: rotate(45deg); }
        .rose2 .rose-center { position: absolute; width: 10px; height: 10px; background: radial-gradient(circle, #ff6b8a, #e85575); border-radius: 50%; top: 16px; left: 22px; }

        /* Rose 3 - Deep red */
        .rose3 { top: 45px; left: 70%; transform: translateX(-50%) scale(0); animation-delay: 1.1s; }
        .rose3 .rose-petal:nth-child(1) { width: 24px; height: 28px; background: radial-gradient(ellipse at 50% 30%, #dc3545, #a71d2a); top: 6px; left: 16px; }
        .rose3 .rose-petal:nth-child(2) { width: 26px; height: 30px; background: radial-gradient(ellipse at 50% 30%, #c82333, #8b1a2b); top: 4px; left: 4px; transform: rotate(-28deg); }
        .rose3 .rose-petal:nth-child(3) { width: 26px; height: 30px; background: radial-gradient(ellipse at 50% 30%, #c82333, #8b1a2b); top: 4px; left: 26px; transform: rotate(28deg); }
        .rose3 .rose-petal:nth-child(4) { width: 30px; height: 33px; background: radial-gradient(ellipse at 50% 40%, #a71d2a, #7a1420); top: 8px; left: -2px; transform: rotate(-48deg); }
        .rose3 .rose-petal:nth-child(5) { width: 30px; height: 33px; background: radial-gradient(ellipse at 50% 40%, #a71d2a, #7a1420); top: 8px; left: 26px; transform: rotate(48deg); }
        .rose3 .rose-center { position: absolute; width: 11px; height: 11px; background: radial-gradient(circle, #dc3545, #a71d2a); border-radius: 50%; top: 16px; left: 22px; }

        /* Peony / large fluffy flowers */
        .peony {
            position: absolute;
            animation: bloom 2s ease-out forwards, gentle-sway 5s ease-in-out infinite;
            transform: scale(0);
        }

        .peony1 {
            top: 0px;
            left: 38%;
            width: 80px;
            height: 80px;
            animation-delay: 0.3s;
        }

        .peony-petal-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .peony1 .peony-petal-ring .pp {
            position: absolute;
            width: 28px;
            height: 35px;
            border-radius: 50%;
            transform-origin: center bottom;
        }

        .peony1 .ring1 .pp { background: radial-gradient(ellipse at 50% 30%, #f8c8dc, #f0a0c0); }
        .peony1 .ring1 .pp:nth-child(1) { transform: rotate(0deg) translateY(-18px); }
        .peony1 .ring1 .pp:nth-child(2) { transform: rotate(60deg) translateY(-18px); }
        .peony1 .ring1 .pp:nth-child(3) { transform: rotate(120deg) translateY(-18px); }
        .peony1 .ring1 .pp:nth-child(4) { transform: rotate(180deg) translateY(-18px); }
        .peony1 .ring1 .pp:nth-child(5) { transform: rotate(240deg) translateY(-18px); }
        .peony1 .ring1 .pp:nth-child(6) { transform: rotate(300deg) translateY(-18px); }

        .peony1 .ring2 .pp { 
            background: radial-gradient(ellipse at 50% 30%, #fdd5e5, #f8c0d8); 
            width: 22px; height: 28px;
        }
        .peony1 .ring2 .pp:nth-child(1) { transform: rotate(30deg) translateY(-12px); }
        .peony1 .ring2 .pp:nth-child(2) { transform: rotate(90deg) translateY(-12px); }
        .peony1 .ring2 .pp:nth-child(3) { transform: rotate(150deg) translateY(-12px); }
        .peony1 .ring2 .pp:nth-child(4) { transform: rotate(210deg) translateY(-12px); }
        .peony1 .ring2 .pp:nth-child(5) { transform: rotate(270deg) translateY(-12px); }
        .peony1 .ring2 .pp:nth-child(6) { transform: rotate(330deg) translateY(-12px); }

        .peony-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            background: radial-gradient(circle, #ffe0ec, #ffd0e0);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 182, 193, 0.5);
            z-index: 2;
        }

        /* Peony 2 - Lavender */
        .peony2 {
            top: 10px;
            left: 58%;
            width: 70px;
            height: 70px;
            animation-delay: 0.6s;
        }

        .peony2 .peony-petal-ring .pp {
            position: absolute;
            width: 24px;
            height: 30px;
            border-radius: 50%;
            transform-origin: center bottom;
        }

        .peony2 .ring1 .pp { background: radial-gradient(ellipse at 50% 30%, #d8b4fe, #c084fc); }
        .peony2 .ring1 .pp:nth-child(1) { transform: rotate(0deg) translateY(-16px); }
        .peony2 .ring1 .pp:nth-child(2) { transform: rotate(72deg) translateY(-16px); }
        .peony2 .ring1 .pp:nth-child(3) { transform: rotate(144deg) translateY(-16px); }
        .peony2 .ring1 .pp:nth-child(4) { transform: rotate(216deg) translateY(-16px); }
        .peony2 .ring1 .pp:nth-child(5) { transform: rotate(288deg) translateY(-16px); }

        .peony2 .ring2 .pp { 
            background: radial-gradient(ellipse at 50% 30%, #e9d5ff, #d8b4fe); 
            width: 18px; height: 24px;
        }
        .peony2 .ring2 .pp:nth-child(1) { transform: rotate(36deg) translateY(-10px); }
        .peony2 .ring2 .pp:nth-child(2) { transform: rotate(108deg) translateY(-10px); }
        .peony2 .ring2 .pp:nth-child(3) { transform: rotate(180deg) translateY(-10px); }
        .peony2 .ring2 .pp:nth-child(4) { transform: rotate(252deg) translateY(-10px); }
        .peony2 .ring2 .pp:nth-child(5) { transform: rotate(324deg) translateY(-10px); }

        /* Small filler flowers - Baby's breath */
        .babys-breath {
            position: absolute;
            animation: bloom 1.5s ease-out forwards, gentle-sway 3s ease-in-out infinite;
            transform: scale(0);
        }

        .bb-dot {
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #ffffff, #e8e0f0);
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.4);
        }

        .bb1 { top: 30px; left: 22%; animation-delay: 1.3s; }
        .bb1 .bb-dot:nth-child(1) { top: 0; left: 0; }
        .bb1 .bb-dot:nth-child(2) { top: -8px; left: 10px; }
        .bb1 .bb-dot:nth-child(3) { top: 5px; left: 12px; }
        .bb1 .bb-dot:nth-child(4) { top: -5px; left: -5px; width: 6px; height: 6px; }
        .bb1 .bb-dot:nth-child(5) { top: 10px; left: 3px; width: 6px; height: 6px; }

        .bb2 { top: 25px; left: 75%; animation-delay: 1.5s; }
        .bb2 .bb-dot:nth-child(1) { top: 0; left: 0; }
        .bb2 .bb-dot:nth-child(2) { top: -10px; left: 8px; }
        .bb2 .bb-dot:nth-child(3) { top: 4px; left: 10px; }
        .bb2 .bb-dot:nth-child(4) { top: 8px; left: -4px; width: 6px; height: 6px; }

        .bb3 { top: 60px; left: 18%; animation-delay: 1.7s; }
        .bb3 .bb-dot:nth-child(1) { top: 0; left: 0; }
        .bb3 .bb-dot:nth-child(2) { top: -6px; left: 9px; }
        .bb3 .bb-dot:nth-child(3) { top: 6px; left: 11px; width: 6px; height: 6px; }

        .bb4 { top: 55px; left: 80%; animation-delay: 1.9s; }
        .bb4 .bb-dot:nth-child(1) { top: 0; left: 0; }
        .bb4 .bb-dot:nth-child(2) { top: -8px; left: 7px; }
        .bb4 .bb-dot:nth-child(3) { top: 3px; left: 10px; width: 6px; height: 6px; }

        .bb5 { top: 5px; left: 48%; animation-delay: 1.4s; }
        .bb5 .bb-dot:nth-child(1) { top: 0; left: 0; }
        .bb5 .bb-dot:nth-child(2) { top: -7px; left: -7px; }
        .bb5 .bb-dot:nth-child(3) { top: 5px; left: -9px; width: 6px; height: 6px; }

        /* Tulip-like flowers */
        .tulip {
            position: absolute;
            animation: bloom 2s ease-out forwards, gentle-sway 4.5s ease-in-out infinite;
            transform: scale(0);
        }

        .tulip1 {
            top: 70px;
            left: 25%;
            animation-delay: 0.9s;
        }

        .tulip-petal {
            position: absolute;
            border-radius: 50% 50% 20% 20%;
            transform-origin: center bottom;
        }

        .tulip1 .tulip-petal:nth-child(1) { width: 18px; height: 32px; background: linear-gradient(to top, #ff6b6b, #ff8e8e); left: 8px; top: 0; transform: rotate(-8deg); }
        .tulip1 .tulip-petal:nth-child(2) { width: 18px; height: 32px; background: linear-gradient(to top, #ff5252, #ff7b7b); left: 0px; top: 2px; transform: rotate(-20deg); }
        .tulip1 .tulip-petal:nth-child(3) { width: 18px; height: 32px; background: linear-gradient(to top, #ff5252, #ff7b7b); left: 16px; top: 2px; transform: rotate(20deg); }

        .tulip2 {
            top: 65px;
            left: 72%;
            animation-delay: 1.2s;
        }

        .tulip2 .tulip-petal:nth-child(1) { width: 16px; height: 28px; background: linear-gradient(to top, #f59e0b, #fbbf24); left: 7px; top: 0; }
        .tulip2 .tulip-petal:nth-child(2) { width: 16px; height: 28px; background: linear-gradient(to top, #d97706, #f59e0b); left: 0px; top: 2px; transform: rotate(-18deg); }
        .tulip2 .tulip-petal:nth-child(3) { width: 16px; height: 28px; background: linear-gradient(to top, #d97706, #f59e0b); left: 14px; top: 2px; transform: rotate(18deg); }

        /* Eucalyptus / Greenery */
        .greenery {
            position: absolute;
            animation: bloom 1.8s ease-out forwards;
            transform: scale(0);
        }

        .green-leaf {
            position: absolute;

        /* Glow behind bouquet */
        .glow {
            position: absolute;
            bottom: 280px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 182, 193, 0.15) 0%, rgba(255, 182, 193, 0.05) 40%, transparent 70%);
            z-index: 1;
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
        }

        /* Falling petals */
        .falling-petal {
            position: fixed;
            width: 12px;
            height: 14px;
            border-radius: 50% 0 50% 50%;
            opacity: 0;
            animation: fall-petal 8s linear infinite;
            z-index: 100;
            pointer-events: none;

        .falling-petal:nth-child(3) { left: 40%; background: rgba(216, 180, 254, 0.5); animation-delay: 4s; animation-duration: 9s; width: 8px; height: 10px; }
        .falling-petal:nth-child(4) { left: 55%; background: rgba(255, 145, 164, 0.6); animation-delay: 1s; animation-duration: 11s; }
        .falling-petal:nth-child(5) { left: 70%; background: rgba(255, 182, 193, 0.5); animation-delay: 3s; animation-duration: 10s; width: 10px; height: 12px; }
        .falling-petal:nth-child(6) { left: 85%; background: rgba(192, 132, 252, 0.5); animation-delay: 5s; animation-duration: 13s; width: 9px; height: 11px; }
        .falling-petal:nth-child(7) { left: 33%; background: rgba(255, 107, 107, 0.5); animation-delay: 6s; animation-duration: 11s; }
        .falling-petal:nth-child(8) { left: 62%; background: rgba(253, 213, 229, 0.5); animation-delay: 7s; animation-duration: 9s; width: 11px; height: 13px; }

        @keyframes fall-petal {
            0% { opacity: 0; transform: translateY(-20px) rotate(0deg) translateX(0); }
            10% { opacity: 0.8; }
            100% { opacity: 0; transform: translateY(100vh) rotate(720deg) translateX(80px); }
        }

        /* Animations */
        @keyframes bloom {
            0% { transform: scale(0) translateX(-50%); opacity: 0; }
            50% { transform: scale(1.15) translateX(-50%); opacity: 1; }
            100% { transform: scale(1) translateX(-50%); opacity: 1; }
        }

        @keyframes gentle-sway {
            0%, 100% { transform: scale(1) translateX(-50%) rotate(0deg); }
            25% { transform: scale(1) translateX(-50%) rotate(2deg); }
            75% { transform: scale(1) translateX(-50%) rotate(-2deg); }
        }

        /* Messages */
        .messages {
            text-align: center;
            margin-top: 30px;
            position: relative;
            z-index: 20;
            padding: 0 20px;
        }

        .message {
            font-family: 'Dancing Script', cursive;
            color: #f8e8ee;
            opacity: 0;
            transform: translateY(20px);
            margin: 12px 0;
            text-shadow: 0 0 20px rgba(255, 182, 193, 0.4), 0 2px 4px rgba(0, 0, 0, 0.3);
            line-height: 1.4;
        }

        .msg1 {

            font-weight: 700;
            color: #ffd1dc;
            animation: fadeInMsg 1.5s ease-out 3s forwards;
        }

        .msg2 {
            font-size: 22px;
            font-weight: 400;
            color: #e8c8d8;
            animation: fadeInMsg 1.5s ease-out 4.5s forwards;
        }

        .msg3 {
            font-size: 24px;
            font-weight: 700;
            color: #ffc0d0;
            animation: fadeInMsg 1.5s ease-out 6s forwards;
        }

        .heart {
            display: inline-block;
            position: relative;
            width: 20px;
            height: 18px;
            vertical-align: middle;
            animation: heartbeat 1.2s ease-in-out infinite;
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 18px;
            background: #ff6b8a;
            border-radius: 12px 12px 0 0;
        }

        .heart::before {
            left: 0;
            transform: rotate(-45deg);
            transform-origin: bottom right;
        }

        .heart::after {
            left: 8px;
            transform: rotate(45deg);
            transform-origin: bottom left;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.2); }
            60% { transform: scale(1); }
        }

        @keyframes fadeInMsg {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Sparkle on hover */
        .scene:hover .glow {
            animation: pulse-glow 1.5s ease-in-out infinite;
        }
