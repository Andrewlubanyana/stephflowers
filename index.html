<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Flower for Steph</title>
<style>
    /* Background & Reset */
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        background: radial-gradient(circle at bottom, #3a0808 0%, #0a0000 80%);
        overflow: hidden;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: flex-end;
    }

    /* Floating Glowing Messages */
    .message {
        position: absolute;
        border: 2px solid #ff3333;
        border-radius: 50px;
        padding: 12px 24px;
        color: #fff;
        font-size: 1.1rem;
        font-weight: 500;
        background: rgba(0, 0, 0, 0.4);
        box-shadow: 0 0 15px #ff3333, inset 0 0 10px #ff3333;
        backdrop-filter: blur(4px);
        text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        animation: float 4s ease-in-out infinite alternate;
        z-index: 10;
        text-align: center;
    }

    /* Positioning matching the image layout */
    .msg1 { top: 20%; left: 15%; animation-delay: 0s; }
    .msg2 { bottom: 30%; left: 10%; animation-delay: 1.5s; }
    .msg3 { top: 30%; right: 15%; animation-delay: 0.7s; }
    .msg4 { bottom: 25%; right: 10%; animation-delay: 2.1s; }

    @keyframes float {
        0% { transform: translateY(0px) scale(1); }
        100% { transform: translateY(-15px) scale(1.02); }
    }

    /* CSS Glowing Flower Art */
    .flower-container {
        position: relative;
        height: 450px;
        width: 300px;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        z-index: 5;
    }

    .stem {
        width: 8px;
        height: 300px;
        background: linear-gradient(to top, #003311, #00cc66);
        border-radius: 10px;
        position: relative;
        box-shadow: 0 0 15px #00cc66;
    }

    .leaf {
        position: absolute;
        width: 70px;
        height: 35px;
        background: linear-gradient(45deg, #006633, #00cc66);
        border-radius: 50% 0 50% 0;
        box-shadow: 0 0 15px #00cc66;
    }

    .leaf.left {
        left: -65px;
        bottom: 120px;
        transform: rotate(-30deg);
        animation: sway-leaf 4s ease-in-out infinite alternate;
    }

    .leaf.right {
        right: -65px;
        bottom: 180px;
        transform: rotate(30deg) scaleX(-1);
        animation: sway-leaf 4.5s ease-in-out infinite alternate-reverse;
    }

    .flower-head {
        position: absolute;
        top: -70px;
        left: -46px;
        width: 100px;
        height: 100px;
        animation: sway 5s ease-in-out infinite alternate;
        transform-origin: bottom center;
    }

    .petal {
        position: absolute;
        width: 40px;
        height: 90px;
        background: radial-gradient(circle at bottom, #ff8c00, #ff1a1a);
        border-radius: 50% 50% 10% 10%;
        box-shadow: 0 0 25px #ff3333;
        top: 0;
        left: 30px;
        transform-origin: bottom center;
        opacity: 0.9;
    }

    /* Spreading the petals out */
    .petal:nth-child(1) { transform: rotate(0deg); }
    .petal:nth-child(2) { transform: rotate(45deg); }
    .petal:nth-child(3) { transform: rotate(-45deg); }
    .petal:nth-child(4) { transform: rotate(90deg); }
    .petal:nth-child(5) { transform: rotate(-90deg); }

    .center {
        position: absolute;
        width: 34px;
        height: 34px;
        background: radial-gradient(circle, #ffff99, #ffcc00);
        border-radius: 50%;
        bottom: 15px;
        left: 33px;
        box-shadow: 0 0 20px #ffff66, inset 0 0 10px #ff6600;
        z-index: 2;
    }

    /* Animations for natural movement */
    @keyframes sway {
        0% { transform: rotate(-6deg); }
        100% { transform: rotate(6deg); }
    }

    @keyframes sway-leaf {
        0% { transform: rotate(-35deg); }
        100% { transform: rotate(-25deg); }
    }

    /* Magical Spark/Firefly Particles */
    .particles {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        z-index: 1;
    }

    .particle {
        position: absolute;
        width: 5px; height: 5px;
        background: #ffcc00;
        border-radius: 50%;
        box-shadow: 0 0 12px #ffcc00, 0 0 20px #ff6600;
        animation: rise infinite ease-in;
        opacity: 0;
    }

    @keyframes rise {
        0% { transform: translateY(100vh) scale(0); opacity: 0; }
        10% { opacity: 0.8; }
        90% { opacity: 0.8; }
        100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

</style>
</head>
<body>

    <!-- Floating Messages Personalized for Steph -->
    <div class="message msg1">Steph, you are my favorite person</div>
    <div class="message msg2">You make my world brighter ❤️</div>
    <div class="message msg3">I'm so lucky to have you</div>
    <div class="message msg4">Every flower reminds me of you</div>

    <!-- The CSS Glowing Flower -->
    <div class="flower-container">
        <div class="stem">
            <div class="leaf left"></div>
            <div class="leaf right"></div>
            <div class="flower-head">
                <!-- Petals -->
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <!-- Flower Core -->
                <div class="center"></div>
            </div>
        </div>
    </div>

    <!-- Sparkles Container -->
    <div class="particles" id="particles"></div>

    <!-- JavaScript to generate random floating fireflies -->
    <script>
        const particleContainer = document.getElementById('particles');
        const particleCount = 40;

        for (let i = 0; i < particleCount; i++) {
            let particle = document.createElement('div');
            particle.classList.add('particle');

            // Randomize position and animation timing for natural look
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = (Math.random() * 6 + 6) + 's';
            particle.style.animationDelay = (Math.random() * 8) + 's';

            particleContainer.appendChild(particle);
        }
    </script>
</body>
</html>
