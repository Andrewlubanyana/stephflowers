<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowers for Steph 💐</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Quicksand:wght@300;400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 30%, #16213e 60%, #0a0a1a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            padding: 20px;
        }

        /* Fireflies */
        .firefly {
            position: fixed;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #ffd700;
            box-shadow: 0 0 6px 2px rgba(255, 215, 0, 0.6), 0 0 15px 5px rgba(255, 215, 0, 0.3);
            animation: float-firefly 8s ease-in-out infinite;
            opacity: 0;
        }

        .firefly:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; animation-duration: 7s; }
        .firefly:nth-child(2) { left: 80%; top: 30%; animation-delay: 1.5s; animation-duration: 9s; }
        .firefly:nth-child(3) { left: 50%; top: 60%; animation-delay: 3s; animation-duration: 6s; }
        .firefly:nth-child(4) { left: 30%; top: 70%; animation-delay: 2s; animation-duration: 10s; }
        .firefly:nth-child(5) { left: 70%; top: 15%; animation-delay: 4s; animation-duration: 8s; }
        .firefly:nth-child(6) { left: 15%; top: 50%; animation-delay: 5s; animation-duration: 7s; }
        .firefly:nth-child(7) { left: 85%; top: 65%; animation-delay: 1s; animation-duration: 11s; }
        .firefly:nth-child(8) { left: 45%; top: 10%; animation-delay: 3.5s; animation-duration: 9s; }

        @keyframes float-firefly {
            0%, 100% { opacity: 0; transform: translate(0, 0); }
            20% { opacity: 1; }
            50% { opacity: 0.6; transform: translate(30px, -40px); }
            80% { opacity: 1; }
        }

        /* Stars */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        .star:nth-child(1) { top: 5%; left: 15%; animation-delay: 0s; }
        .star:nth-child(2) { top: 12%; left: 45%; animation-delay: 0.5s; width: 3px; height: 3px; }
        .star:nth-child(3) { top: 8%; left: 75%; animation-delay: 1s; }
        .star:nth-child(4) { top: 18%; left: 90%; animation-delay: 1.5s; }
        .star:nth-child(5) { top: 3%; left: 55%; animation-delay: 2s; width: 3px; height: 3px; }
        .star:nth-child(6) { top: 15%; left: 25%; animation-delay: 0.8s; }
        .star:nth-child(7) { top: 7%; left: 65%; animation-delay: 1.2s; }
        .star:nth-child(8) { top: 20%; left: 35%; animation-delay: 2.5s; }
        .star:nth-child(9) { top: 2%; left: 85%; animation-delay: 0.3s; width: 3px; height: 3px; }
        .star:nth-child(10) { top: 10%; left: 5%; animation-delay: 1.8s; }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .scene {
            position: relative;
            width: 450px;
            height: 580px;
        }

        /* GLOW behind everything */
        .glow {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 380px;
            height: 280px;
            background: radial-gradient(ellipse, rgba(255, 182, 193, 0.2) 0%, rgba(255, 182, 193, 0.06) 40%, transparent 70%);
            z-index: 1;
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
        }

        /* === STEMS === short, going from wrap top to flowers */
        .stems {
            position: absolute;
            top: 240px;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 90px;
            z-index: 5;
        }

        .stem {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 4px;
            background: linear-gradient(to top, #2d5016, #4a8c2a);
            border-radius: 2px;
            transform-origin: bottom center;
        }

        .stem:nth-child(1) { height: 90px; transform: translateX(-50%) rotate(0deg); }
        .stem:nth-child(2) { height: 85px; transform: translateX(-50%) rotate(-15deg); }
        .stem:nth-child(3) { height: 85px; transform: translateX(-50%) rotate(15deg); }
        .stem:nth-child(4) { height: 80px; transform: translateX(-50%) rotate(-28deg); }
        .stem:nth-child(5) { height: 80px; transform: translateX(-50%) rotate(28deg); }
        .stem:nth-child(6) { height: 75px; transform: translateX(-50%) rotate(-40deg); }
        .stem:nth-child(7) { height: 75px; transform: translateX(-50%) rotate(40deg); }

        /* === FLOWERS CLUSTER === tight bouquet shape */
        .flowers {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 340px;
            height: 200px;
            z-index: 8;
        }

        .flower-pos {
            position: absolute;
            animation: bloom 1.8s ease-out backwards;
        }

        @keyframes bloom {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* === ROSE === */
        .rose {
            position: relative;
            width: 65px;
            height: 65px;
        }

        .rose-petal {
            position: absolute;
            border-radius: 50%;
        }

        /* Rose Red */
        .rose-red .rose-petal:nth-child(1) { width: 38px; height: 42px; background: radial-gradient(ellipse at 50% 30%, #e8425a, #b8283e); top: 14px; left: 4px; transform: rotate(-50deg); }
        .rose-red .rose-petal:nth-child(2) { width: 38px; height: 42px; background: radial-gradient(ellipse at 50% 30%, #e8425a, #b8283e); top: 14px; left: 24px; transform: rotate(50deg); }
        .rose-red .rose-petal:nth-child(3) { width: 32px; height: 36px; background: radial-gradient(ellipse at 50% 30%, #ff5277, #d63652); top: 8px; left: 7px; transform: rotate(-25deg); }
        .rose-red .rose-petal:nth-child(4) { width: 32px; height: 36px; background: radial-gradient(ellipse at 50% 30%, #ff5277, #d63652); top: 8px; left: 27px; transform: rotate(25deg); }
        .rose-red .rose-petal:nth-child(5) { width: 28px; height: 32px; background: radial-gradient(ellipse at 50% 30%, #ff6b8a, #e8425a); top: 12px; left: 19px; }
        .rose-red .rose-center { position: absolute; width: 14px; height: 14px; background: radial-gradient(circle at 35% 35%, #ff3355, #8a0e2a); border-radius: 50%; top: 24px; left: 26px; box-shadow: inset 2px 2px 4px rgba(0,0,0,0.4); }

        /* Rose Pink */
        .rose-pink .rose-petal:nth-child(1) { width: 36px; height: 40px; background: radial-gradient(ellipse at 50% 30%, #ff7d95, #e86b82); top: 14px; left: 4px; transform: rotate(-50deg); }
        .rose-pink .rose-petal:nth-child(2) { width: 36px; height: 40px; background: radial-gradient(ellipse at 50% 30%, #ff7d95, #e86b82); top: 14px; left: 24px; transform: rotate(50deg); }
        .rose-pink .rose-petal:nth-child(3) { width: 30px; height: 34px; background: radial-gradient(ellipse at 50% 30%, #ffa0b4, #ff7d95); top: 8px; left: 8px; transform: rotate(-25deg); }
        .rose-pink .rose-petal:nth-child(4) { width: 30px; height: 34px; background: radial-gradient(ellipse at 50% 30%, #ffa0b4, #ff7d95); top: 8px; left: 27px; transform: rotate(25deg); }
        .rose-pink .rose-petal:nth-child(5) { width: 26px; height: 30px; background: radial-gradient(ellipse at 50% 30%, #ffb6c1, #ff91a4); top: 12px; left: 19px; }
        .rose-pink .rose-center { position: absolute; width: 12px; height: 12px; background: radial-gradient(circle at 35% 35%, #ff6b8a, #c44569); border-radius: 50%; top: 24px; left: 26px; }

        /* Rose Deep Red */
        .rose-deep .rose-petal:nth-child(1) { width: 36px; height: 40px; background: radial-gradient(ellipse at 50% 30%, #a71d2a, #7a1420); top: 14px; left: 4px; transform: rotate(-50deg); }
        .rose-deep .rose-petal:nth-child(2) { width: 36px; height: 40px; background: radial-gradient(ellipse at 50% 30%, #a71d2a, #7a1420); top: 14px; left: 24px; transform: rotate(50deg); }
        .rose-deep .rose-petal:nth-child(3) { width: 30px; height: 34px; background: radial-gradient(ellipse at 50% 30%, #c82333, #8b1a2b); top: 8px; left: 8px; transform: rotate(-25deg); }
        .rose-deep .rose-petal:nth-child(4) { width: 30px; height: 34px; background: radial-gradient(ellipse at 50% 30%, #c82333, #8b1a2b); top: 8px; left: 27px; transform: rotate(25deg); }
        .rose-deep .rose-petal:nth-child(5) { width: 26px; height: 30px; background: radial-gradient(ellipse at 50% 30%, #dc3545, #a71d2a); top: 12px; left: 19px; }
        .rose-deep .rose-center { position: absolute; width: 12px; height: 12px; background: radial-gradient(circle at 35% 35%, #8b1a2b, #4a0a14); border-radius: 50%; top: 24px; left: 26px; }

        /* === PEONY === */
        .peony {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .peony-petal {
            position: absolute;
            width: 28px;
            height: 35px;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            margin-top: -17px;
            margin-left: -14px;
            transform-origin: center 17px;
        }

        .peony-pink .ring1 .peony-petal { background: radial-gradient(ellipse at 50% 30%, #f0a0c0, #d680a0); }
        .peony-pink .ring1 .peony-petal:nth-child(1) { transform: rotate(0deg) translateY(-18px); }
        .peony-pink .ring1 .peony-petal:nth-child(2) { transform: rotate(60deg) translateY(-18px); }
        .peony-pink .ring1 .peony-petal:nth-child(3) { transform: rotate(120deg) translateY(-18px); }
        .peony-pink .ring1 .peony-petal:nth-child(4) { transform: rotate(180deg) translateY(-18px); }
        .peony-pink .ring1 .peony-petal:nth-child(5) { transform: rotate(240deg) translateY(-18px); }
        .peony-pink .ring1 .peony-petal:nth-child(6) { transform: rotate(300deg) translateY(-18px); }

        .peony-pink .ring2 .peony-petal {
            background: radial-gradient(ellipse at 50% 30%, #f8c8dc, #f0a0c0);
            width: 22px; height: 28px;
            margin-top: -14px; margin-left: -11px;
            transform-origin: center 14px;
        }
        .peony-pink .ring2 .peony-petal:nth-child(1) { transform: rotate(30deg) translateY(-11px); }
        .peony-pink .ring2 .peony-petal:nth-child(2) { transform: rotate(90deg) translateY(-11px); }
        .peony-pink .ring2 .peony-petal:nth-child(3) { transform: rotate(150deg) translateY(-11px); }
        .peony-pink .ring2 .peony-petal:nth-child(4) { transform: rotate(210deg) translateY(-11px); }
        .peony-pink .ring2 .peony-petal:nth-child(5) { transform: rotate(270deg) translateY(-11px); }
        .peony-pink .ring2 .peony-petal:nth-child(6) { transform: rotate(330deg) translateY(-11px); }

        .peony-pink .peony-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 16px; height: 16px;
            background: radial-gradient(circle, #ffe0ec, #ffb6cd);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 182, 193, 0.6);
            z-index: 2;
        }

        /* Peony Lavender */
        .peony-lav { width: 70px; height: 70px; }
        .peony-lav .ring1 .peony-petal { background: radial-gradient(ellipse at 50% 30%, #c084fc, #a855f7); width: 24px; height: 30px; margin-top: -15px; margin-left: -12px; transform-origin: center 15px; }
        .peony-lav .ring1 .peony-petal:nth-child(1) { transform: rotate(0deg) translateY(-15px); }
        .peony-lav .ring1 .peony-petal:nth-child(2) { transform: rotate(72deg) translateY(-15px); }
        .peony-lav .ring1 .peony-petal:nth-child(3) { transform: rotate(144deg) translateY(-15px); }
        .peony-lav .ring1 .peony-petal:nth-child(4) { transform: rotate(216deg) translateY(-15px); }
        .peony-lav .ring1 .peony-petal:nth-child(5) { transform: rotate(288deg) translateY(-15px); }

        .peony-lav .ring2 .peony-petal { background: radial-gradient(ellipse at 50% 30%, #d8b4fe, #c084fc); width: 18px; height: 24px; margin-top: -12px; margin-left: -9px; transform-origin: center 12px; }
        .peony-lav .ring2 .peony-petal:nth-child(1) { transform: rotate(36deg) translateY(-9px); }
        .peony-lav .ring2 .peony-petal:nth-child(2) { transform: rotate(108deg) translateY(-9px); }
        .peony-lav .ring2 .peony-petal:nth-child(3) { transform: rotate(180deg) translateY(-9px); }
        .peony-lav .ring2 .peony-petal:nth-child(4) { transform: rotate(252deg) translateY(-9px); }
        .peony-lav .ring2 .peony-petal:nth-child(5) { transform: rotate(324deg) translateY(-9px); }

        .peony-lav .peony-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 13px; height: 13px;
            background: radial-gradient(circle, #f3e8ff, #d8b4fe);
            border-radius: 50%;
            z-index: 2;
        }

        /* === BABY'S BREATH === */
        .babys-breath {
            position: relative;
            width: 35px;
            height: 35px;
        }

        .bb-dot {
            width: 8px;
            height: 8px;
            background: radial-gradient(circle at 35% 35%, #ffffff, #e8e0f0);
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .bb-dot:nth-child(1) { top: 6px; left: 6px; }
        .bb-dot:nth-child(2) { top: 0px; left: 16px; }
        .bb-dot:nth-child(3) { top: 12px; left: 20px; }
        .bb-dot:nth-child(4) { top: 20px; left: 10px; width: 6px; height: 6px; }
        .bb-dot:nth-child(5) { top: 4px; left: 24px; width: 6px; height: 6px; }
        .bb-dot:nth-child(6) { top: 16px; left: 0px; width: 6px; height: 6px; }

        /* === GREENERY === */
        .greenery {
            position: relative;
            width: 45px;
            height: 45px;
        }

        .green-leaf {
            position: absolute;
            border-radius: 50%;
        }

        .greenery .green-leaf:nth-child(1) { width: 20px; height: 28px; background: linear-gradient(135deg, #6ab04c, #4a8c2a); top: 0; left: 6px; transform: rotate(-25deg); }
        .greenery .green-leaf:nth-child(2) { width: 18px; height: 24px; background: linear-gradient(135deg, #78c850, #5ba33a); top: 10px; left: -2px; transform: rotate(-50deg); }
        .greenery .green-leaf:nth-child(3) { width: 16px; height: 22px; background: linear-gradient(135deg, #88d860, #6ab04c); top: 16px; left: 20px; transform: rotate(20deg); }

        /* === FLOWER POSITIONS === Tight cluster like a real bouquet */
        /* Top edges - greenery & baby's breath */
        .pos-green1 { top: 20px; left: 5px; animation-delay: 1.5s; z-index: 6; }
        .pos-green2 { top: 20px; right: 5px; animation-delay: 1.6s; z-index: 6; transform: scaleX(-1); }
        .pos-green3 { top: 80px; left: 0px; animation-delay: 1.8s; z-index: 6; }
        .pos-green4 { top: 80px; right: 0px; animation-delay: 1.9s; z-index: 6; transform: scaleX(-1); }

        .pos-bb1 { top: 0px; left: 100px; animation-delay: 1.6s; z-index: 7; }
        .pos-bb2 { top: 0px; right: 100px; animation-delay: 1.7s; z-index: 7; }
        .pos-bb3 { top: 60px; left: 50px; animation-delay: 1.8s; z-index: 11; }
        .pos-bb4 { top: 60px; right: 50px; animation-delay: 1.9s; z-index: 11; }
        .pos-bb5 { top: 110px; left: 145px; animation-delay: 2.0s; z-index: 11; }

        /* Center - main peony (largest, top-center) */
        .pos-peony1 { top: 30px; left: 130px; animation-delay: 0.3s; z-index: 9; }

        /* Side peonies (lavender) */
        .pos-peony2 { top: 50px; left: 50px; animation-delay: 0.6s; z-index: 8; }
        .pos-peony3 { top: 50px; right: 50px; animation-delay: 0.7s; z-index: 8; }

        /* Roses - lower middle */
        .pos-rose1 { top: 80px; left: 138px; animation-delay: 0.5s; z-index: 10; }
        .pos-rose2 { top: 95px; left: 30px; animation-delay: 0.8s; z-index: 9; }
        .pos-rose3 { top: 95px; right: 30px; animation-delay: 1.0s; z-index: 9; }

        /* Tulips - bottom (peeking out) */
        .pos-tulip1 { top: 145px; left: 105px; animation-delay: 1.1s; z-index: 9; }
        .pos-tulip2 { top: 145px; right: 105px; animation-delay: 1.2s; z-index: 9; }

        /* === TULIP === */
        .tulip {
            position: relative;
            width: 38px;
            height: 45px;
        }

        .tulip-petal {
            position: absolute;
            border-radius: 50% 50% 20% 20%;
        }

        .tulip-orange .tulip-petal:nth-child(1) { width: 18px; height: 32px; background: linear-gradient(to top, #d97706, #fbbf24); left: 10px; top: 4px; }
        .tulip-orange .tulip-petal:nth-child(2) { width: 16px; height: 28px; background: linear-gradient(to top, #b45309, #d97706); left: 2px; top: 8px; transform: rotate(-15deg); }
        .tulip-orange .tulip-petal:nth-child(3) { width: 16px; height: 28px; background: linear-gradient(to top, #b45309, #d97706); left: 20px; top: 8px; transform: rotate(15deg); }

        /* === BOUQUET WRAP === smaller, more proportionate */
        .wrap {
            position: absolute;
            top: 320px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            z-index: 12;
        }

        .wrap-paper {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 200px;
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d5c4 50%, #d8c5b4 100%);
            clip-path: polygon(25% 0%, 75% 0%, 100% 100%, 0% 100%);
            box-shadow: inset -20px 0 40px rgba(0,0,0,0.1), inset 20px 0 40px rgba(255,255,255,0.3);
            z-index: 3;
        }

        .wrap-fold-left {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-90%);
            width: 110px;
            height: 195px;
            background: linear-gradient(135deg, #ede0d4, #ddd0c0);
            clip-path: polygon(50% 0%, 100% 0%, 100% 100%, 0% 100%);
            z-index: 1;
        }

        .wrap-fold-right {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-10%);
            width: 110px;
            height: 195px;
            background: linear-gradient(135deg, #f0e3d6, #e5d8cb);
            clip-path: polygon(0% 0%, 50% 0%, 100% 100%, 0% 100%);
            z-index: 2;
        }

        /* === RIBBON === at top of wrap where stems meet === */
        .ribbon {
            position: absolute;
            top: 310px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            width: 90px;
            height: 80px;
        }

        .ribbon-knot {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 18px;
            background: linear-gradient(135deg, #e74c6f, #c44569);
            border-radius: 4px;
            z-index: 3;
            box-shadow: inset 0 -3px 5px rgba(0,0,0,0.2);
        }

        .ribbon-left, .ribbon-right {
            position: absolute;
            top: 8px;
            width: 32px;
            height: 32px;
            z-index: 2;
        }

        .ribbon-left {
            right: 50%;
            margin-right: 8px;
            background: linear-gradient(135deg, #e74c6f, #c44569);
            clip-path: polygon(100% 50%, 70% 0%, 0% 0%, 30% 50%, 0% 100%, 70% 100%);
        }

        .ribbon-right {
            left: 50%;
            margin-left: 8px;
            background: linear-gradient(225deg, #e74c6f, #c44569);
            clip-path: polygon(0% 50%, 30% 0%, 100% 0%, 70% 50%, 100% 100%, 30% 100%);
        }

        .ribbon-tail-left, .ribbon-tail-right {
            position: absolute;
            top: 30px;
            width: 9px;
            height: 45px;
            z-index: 1;
        }

        .ribbon-tail-left {
            right: 50%;
            margin-right: 2px;
            background: linear-gradient(to bottom, #c44569, #e74c6f);
            transform: rotate(8deg);
            clip-path: polygon(0%
