<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A Bouquet for Steph</title>
<style>
    /* Reset & Deep Canvas */
    * { box-sizing: border-box; }
    body, html {
        margin: 0; padding: 0; height: 100vh; width: 100vw;
        background: radial-gradient(ellipse at bottom, #2b0404 0%, #050000 100%);
        overflow: hidden;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Cinematic Intro Overlay */
    .fade-in-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 100;
        animation: clearOverlay 2s ease-in forwards;
        pointer-events: none;
    }
    @keyframes clearOverlay { to { opacity: 0; visibility: hidden; } }

    /* The glowing message bubbles - Balanced Layout */
    .message {
        position: absolute;
        border: 2px solid #ff1a1a;
        border-radius: 50px;
        padding: 12px 25px;
        color: #fff;
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        background: rgba(20, 0, 0, 0.6);
        box-shadow: 0 0 15px #ff1a1a, inset 0 0 10px #ff1a1a, 0 0 30px rgba(255, 0, 0, 0.4);
        backdrop-filter: blur(5px);
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
        z-index: 20;
        text-align: center;
        white-space: nowrap;
        opacity: 0;
        animation: floatMsg 4s ease-in-out infinite alternate, fadeInMsg 1.5s ease-out forwards;
    }

    /* Staggered load times and balanced positioning (Desktop) */
    .msg1 { top: 12%; left: 50%; transform: translateX(-50%); animation-delay: 1.0s, 1.0s; }
    .msg2 { top: 25%; left: 8%; animation-delay: 1.5s, 1.5s; animation-direction: alternate-reverse; }
    .msg4 { top: 25%; right: 8%; animation-delay: 2.5s, 2.5s; }
    .msg3 { bottom: 42%; left: 50%; transform: translateX(-50%); animation-delay: 2.0s, 2.0s; animation-direction: alternate-reverse; }

    .heart { color: #ff3333; text-shadow: 0 0 10px #ff0000; animation: heartbeat 1.5s infinite; display: inline-block; }

    @keyframes floatMsg { 0% { transform: translate(-50%, 0px); } 100% { transform: translate(-50%, -12px); } }
    @keyframes fadeInMsg { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
    @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }

    /* Scene Container */
    .scene {
        position: absolute; bottom: 0; left: 50%;
        transform: translateX(-50%);
        width: 100vw; height: 60vh;
        display: flex; justify-content: center; align-items: flex-end;
        z-index: 10;
    }

    /* Grass Foreground */
    .grass {
        position: absolute; bottom: -20px; width: 120vw; height: 150px;
        background: radial-gradient(ellipse at top, #004d22 0%, transparent 70%);
        filter: blur(4px); opacity: 0.6; z-index: 1;
    }

    /* NEW Opulent CSS Bouquet Structure */
    .bouquet-container {
        position: relative; width: 600px; height: 650px;
        display: flex; justify-content: center; align-items: flex-end;
        z-index: 5;
        transform-origin: bottom center;
        animation: growBouquet 2s ease-out forwards;
    }
    @keyframes growBouquet { from { transform: scale(0) translateY(300px); } to { transform: scale(1) translateY(0); } }

    /* Centralized Stem Group */
    .stem-group {
        position: absolute; bottom: -20px; width: 200px; height: 250px;
        display: flex; justify-content: center; left: 50%; transform: translateX(-50%);
        z-index: 0;
    }
    .stem { position: absolute; bottom: 0; width: 10px; height: 100%; border-radius: 50px; box-shadow: 0 0 20px #00ff88; }
    .stem.left { width: 8px; height: 80%; background: linear-gradient(to top, #002200, #00e676); left: 70px; transform: rotate(-15deg); transform-origin: bottom center; animation: swayStemLeft 6s ease-in-out infinite alternate; }
    .stem.center { width: 12px; height: 100%; background: linear-gradient(to top, #002200, #00ff88); left: 95px; animation: swayStemCenter 6s ease-in-out infinite alternate-reverse; transform-origin: bottom center; }
    .stem.right { width: 8px; height: 80%; background: linear-gradient(to top, #002200, #00e676); left: 120px; transform: rotate(15deg); transform-origin: bottom center; animation: swayStemRight 6s ease-in-out infinite alternate; }
    
    @keyframes swayStemLeft { 0% { transform: rotate(-18deg); } 100% { transform: rotate(-12deg); } }
    @keyframes swayStemCenter { 0% { transform: rotate(-2deg); } 100% { transform: rotate(2deg); } }
    @keyframes swayStemRight { 0% { transform: rotate(12deg); } 100% { transform: rotate(18deg); } }

    /* Ribbon tying the stems */
    .ribbon {
        position: absolute; bottom: 10%; width: 120px; height: 50px;
        background: linear-gradient(to bottom, #cc0000, #880000);
        left: 50%; transform: translateX(-50%) rotate(5deg);
        box-shadow: 0 0 25px #ff1a1a, inset 0 0 15px rgba(255, 100, 100, 0.4);
        border-radius: 3px 3px 10px 10px; z-index: 10;
    }
    .ribbon-bow {
        position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
        width: 160px; height: 60px; z-index: 11;
    }
    .ribbon-loop {
        position: absolute; width: 70px; height: 40px; border: 4px solid #cc0000;
        background: rgba(200, 0, 0, 0.3); border-radius: 50% 50% 10% 10%;
        box-shadow: 0 0 15px #ff1a1a; top: 0;
    }
    .ribbon-loop.left { left: 0; transform: rotate(-15deg); }
    .ribbon-loop.right { right: 0; transform: rotate(15deg) scaleX(-1); }
    
    .ribbon-center {
        position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
        width: 30px; height: 25px; background: linear-gradient(to bottom, #ff1a1a, #cc0000);
        border-radius: 50%; box-shadow: 0 0 10px #ff3333; z-index: 12;
    }

    /* Flowers & Foliage Common Styles */
    .flower-head, .filler-head { position: absolute; transform-origin: center center; }
    .leaf, .fern-leaf, .eucalyptus-leaf { position: absolute; border-radius: 50% 0 50% 0; box-shadow: 0 0 15px #00cc66; transform-origin: bottom right; }

    /* Central Rose - Rich, Dark, Layered */
    .central-rose {
        top: -60px; left: -10px; width: 120px; height: 120px;
        animation: swayFlower 5s ease-in-out infinite alternate; z-index: 5;
    }
    .rose-petal {
        position: absolute; width: 45%; height: 95%; background: radial-gradient(circle at bottom, #880000, #cc0000);
        border-radius: 50% 50% 10% 10%; box-shadow: 0 0 15px #ff0000; top: 0; left: 27.5%; transform-origin: bottom center; opacity: 0.98;
    }
    .rose-petal:nth-child(1) { transform: rotate(0deg); }
    .rose-petal:nth-child(2) { transform: rotate(45deg); height: 90%; top: 5%; }
    .rose-petal:nth-child(3) { transform: rotate(-45deg); height: 90%; top: 5%; }
    .rose-petal:nth-child(4) { transform: rotate(90deg); height: 80%; top: 10%; }
    .rose-petal:nth-child(5) { transform: rotate(-90deg); height: 80%; top: 10%; }
    .central-rose .core {
        position: absolute; width: 30px; height: 30px; background: radial-gradient(circle, #ffcccc, #ff3333, #880000);
        border-radius: 50%; top: 38px; left: 45px; box-shadow: 0 0 25px #ff6666, 0 0 40px #ff0000, inset 0 0 10px #ffffff; z-index: 10;
    }

    /* Left Peony - Soft, Pink, Ruffled */
    .left-peony {
        top: -45px; left: -15px; width: 100px; height: 100px;
        animation: swayFlowerLeft 4s ease-in-out infinite alternate-reverse; z-index: 4;
    }
    .peony-petal {
        position: absolute; width: 40%; height: 90%; background: radial-gradient(circle at bottom, #ffcccc, #ff66aa);
        border-radius: 50%; box-shadow: 0 0 12px #ff99cc; top: 5px; left: 30%; transform-origin: center bottom; opacity: 0.95;
    }
    .peony-petal:nth-child(1) { transform: rotate(0deg); }
    .peony-petal:nth-child(2) { transform: rotate(30deg); }
    .peony-petal:nth-child(3) { transform: rotate(-30deg); }
    .peony-petal:nth-child(4) { transform: rotate(60deg); }
    .peony-petal:nth-child(5) { transform: rotate(-60deg); }
    .peony-petal:nth-child(6) { transform: rotate(90deg); }
    .peony-petal:nth-child(7) { transform: rotate(-90deg); }
    .left-peony .core {
        position: absolute; width: 25px; height: 25px; background: radial-gradient(circle, #ffffff, #ffffcc, #ffcc00);
        border-radius: 50%; top: 35px; left: 37.5px; box-shadow: 0 0 20px #ffff99, 0 0 35px #ff99cc, inset 0 0 10px #ffffff; z-index: 10;
    }

    /* Right Peony - Soft, Pink, Ruffled */
    .right-peony {
        top: -45px; left: -15px; width: 100px; height: 100px;
        animation: swayFlowerRight 5s ease-in-out infinite alternate; z-index: 4;
    }
    .right-peony .peony-petal { background: radial-gradient(circle at bottom, #ffcccc, #ff99aa); box-shadow: 0 0 12px #ff99cc; }
    .right-peony .core { background: radial-gradient(circle, #ffffff, #ffffcc, #ffcc00); box-shadow: 0 0 20px #ffff99, 0 0 35px #ff99cc; }

    /* Filler Buds - Small, Scattered Yellow */
    .filler-group { position: absolute; bottom: 60%; width: 100%; height: 60px; z-index: 3; }
    .filler-bud { position: absolute; width: 18px; height: 18px; background: radial-gradient(circle, #ffff99, #ffcc00);
        border-radius: 50%; box-shadow: 0 0 10px #ffff66, 0 0 20px #ffff00; animation: budGlow 3s ease-in-out infinite alternate; }
    @keyframes budGlow { 0% { transform: scale(1); opacity: 0.9; } 100% { transform: scale(1.1); opacity: 1; } }
    .filler-bud:nth-child(1) { top: -10px; left: 20%; animation-delay: 0.5s; }
    .filler-bud:nth-child(2) { top: -25px; left: 40%; animation-delay: 1.0s; }
    .filler-bud:nth-child(3) { top: -15px; left: 60%; animation-delay: 1.5s; }
    .filler-bud:nth-child(4) { top: -20px; left: 80%; animation-delay: 2.0s; }

    /* Foliage Varieties */
    .fern-foliage { position: absolute; bottom: 20%; width: 100%; height: 60px; z-index: 2; opacity: 0.7; }
    .fern-leaf { width: 60px; height: 30px; background: linear-gradient(45deg, #002200, #008844); border-radius: 5px 30px 5px 30px; }
    .fern-leaf:nth-child(1) { top: 0; left: 10%; transform: rotate(-20deg); animation: swayFern 6s ease-in-out infinite alternate; }
    .fern-leaf:nth-child(2) { top: -15px; left: 25%; transform: rotate(10deg) scaleX(-1); animation: swayFern 7s ease-in-out infinite alternate-reverse; }
    .fern-leaf:nth-child(3) { top: 0; right: 10%; transform: rotate(20deg) scaleX(-1); animation: swayFern 6s ease-in-out infinite alternate; }
    .fern-leaf:nth-child(4) { top: -15px; right: 25%; transform: rotate(-10deg); animation: swayFern 7s ease-in-out infinite alternate-reverse; }
    @keyframes swayFern { 0% { transform: rotate(-10deg); } 100% { transform: rotate(10deg); } }

    .eucalyptus-group { position: absolute; top: 10%; width: 100%; height: 50px; z-index: 1; }
    .eucalyptus-leaf { width: 35px; height: 35px; background: linear-gradient(45deg, #006633, #00cc66); border-radius: 50%; opacity: 0.6; }
    .eucalyptus-leaf:nth-child(1) { top: 10px; left: 5%; animation: swayEucalyptus 8s ease-in-out infinite alternate; }
    .eucalyptus-leaf:nth-child(2) { top: 0px; left: 15%; animation: swayEucalyptus 9s ease-in-out infinite alternate-reverse; }
    .eucalyptus-leaf:nth-child(3) { top: 10px; right: 5%; animation: swayEucalyptus 8s ease-in-out infinite alternate; }
    .eucalyptus-leaf:nth-child(4) { top: 0px; right: 15%; animation: swayEucalyptus 9s ease-in-out infinite alternate-reverse; }
    @keyframes swayEucalyptus { 0% { transform: translate(-5px, -5px) rotate(-10deg); } 100% { transform: translate(5px, 5px) rotate(10deg); } }

    /* Classic Leaves */
    .simple-leaf-group { position: absolute; bottom: 0; width: 100%; height: 50px; z-index: 6; }
    .leaf { width: 60px; height: 30px; background: linear-gradient(45deg, #004d22, #00ff88); border-radius: 50% 0 50% 0; }
    .leaf.left { left: 10%; transform: rotate(-10deg); animation: swayLeafSimple 4s ease-in-out infinite alternate; }
    .leaf.right { right: 10%; transform: rotate(10deg) scaleX(-1); animation: swayLeafSimple 4.5s ease-in-out infinite alternate-reverse; }
    @keyframes swayLeafSimple { 0% { transform: rotate(-15deg); } 100% { transform: rotate(-5deg); } }

    /* Organic Swaying Animations */
    @keyframes swayFlower { 0% { transform: rotate(-3deg) translate(-2px, -2px); } 100% { transform: rotate(3deg) translate(2px, 2px); } }
    @keyframes swayFlowerLeft { 0% { transform: rotate(-3deg) translate(2px, -2px); } 100% { transform: rotate(-7deg) translate(-2px, 2px); } }
    @keyframes swayFlowerRight { 0% { transform: rotate(3deg) translate(-2px, -2px); } 100% { transform: rotate(7deg) translate(2px, 2px); } }

    /* Magical Fireflies */
    .particles { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 15; }
    .particle {
        position: absolute; background: #ffcc00; border-radius: 50%;
        box-shadow: 0 0 10px #ffcc00, 0 0 20px #ff5500;
        animation: fly infinite linear;
    }
    @keyframes fly {
        0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
        20% { opacity: 1; transform: translateY(80vh) translateX(-20px) scale(1); }
        80% { opacity: 1; transform: translateY(20vh) translateX(20px) scale(1); }
        100% { transform: translateY(-10vh) translateX(-10px) scale(0); opacity: 0; }
    }

    /* 📱 MOBILE RESPONSIVENESS (Layout Engine) */
    @media (max-width: 768px) {
        .bouquet-container { 
            transform: scale(0.55); /* Keeps flowers appropriately sized */
            bottom: -30px; 
            width: 90vw;
        }
        @keyframes growBouquet { from { transform: scale(0) translateY(100px); } to { transform: scale(0.55) translateY(0); } }
        
        .message { 
            font-size: 0.9rem; 
            padding: 10px 18px; 
            white-space: normal; /* Enables multi-line wrapping */
            line-height: 1.4;
            max-width: 80vw;
        }

        /* Re-center and adjust positions for smaller screen */
        .msg1 { top: 10%; left: 50%; transform: translate(-50%, 0); }
        .msg2 { top: 22%; left: 10%; width: 40vw; transform: none; }
        .msg4 { top: 22%; right: 10%; width: 40vw; transform: none; }
        .msg3 { bottom: 35%; left: 50%; transform: translate(-50%, 0); max-width: 85vw; }
        
        @keyframes floatMsgMobile { 0% { transform: translate(-50%, 0px); } 100% { transform: translate(-50%, -8px); } }
        @keyframes fadeInMsgMobile { from { opacity: 0; transform: translate(-50%, 15px); } to { opacity: 1; transform: translate(-50%, 0); } }
        
        .msg1, .msg3 { animation-name: floatMsgMobile, fadeInMsgMobile; }
        .msg2, .msg4 { animation-name: floatMsg, fadeInMsg; transform: none; } /* Default non-centered behavior */
    }

</style>
</head>
<body>

    <div class="fade-in-overlay"></div>

    <!-- Floating Messages perfectly structured for Steph -->
    <div class="message msg1">Steph, you are my favorite person</div>
    <div class="message msg2">I'm so lucky to have you</div>
    <div class="message msg3">You make my world brighter <span class="heart">❤️</span></div>
    <div class="message msg4">Every flower reminds me of you</div>

    <!-- The Opulent CSS Bouquet Scene -->
    <div class="scene">
        <div class="grass"></div>
        <div class="bouquet-container">
            
            <!-- Leaves at the very bottom -->
            <div class="simple-leaf-group">
                <div class="leaf left"></div>
                <div class="leaf right"></div>
            </div>

            <!-- Stems and Ribbon -->
            <div class="stem-group">
                <div class="stem left"></div>
                <div class="stem center"></div>
                <div class="stem right"></div>
                <div class="ribbon">
                    <div class="ribbon-bow">
                        <div class="ribbon-loop left"></div>
                        <div class="ribbon-loop right"></div>
                        <div class="ribbon-center"></div>
                    </div>
                </div>
            </div>

            <!-- Foliage, Fillers, and Bloom Layers -->
            <div class="eucalyptus-group">
                <div class="eucalyptus-leaf"></div>
                <div class="eucalyptus-leaf"></div>
                <div class="eucalyptus-leaf"></div>
                <div class="eucalyptus-leaf"></div>
            </div>
            
            <div class="fern-foliage">
                <div class="fern-leaf"></div>
                <div class="fern-leaf"></div>
                <div class="fern-leaf"></div>
                <div class="fern-leaf"></div>
            </div>

            <div class="filler-group">
                <div class="filler-bud"></div>
                <div class="filler-bud"></div>
                <div class="filler-bud"></div>
                <div class="filler-bud"></div>
            </div>

            <!-- Central Deep Red Rose -->
            <div class="central-rose flower-head">
                <div class="rose-petal"></div><div class="rose-petal"></div><div class="rose-petal"></div>
                <div class="rose-petal"></div><div class="rose-petal"></div><div class="core"></div>
            </div>

            <!-- Soft Pink Peonies -->
            <div class="left-peony flower-head">
                <div class="peony-petal"></div><div class="peony-petal"></div><div class="peony-petal"></div>
                <div class="peony-petal"></div><div class="peony-petal"></div><div class="peony-petal"></div>
                <div class="peony-petal"></div><div class="core"></div>
            </div>
            <div class="right-peony flower-head">
                <div class="peony-petal"></div><div class="peony-petal"></div><div class="peony-petal"></div>
                <div class="peony-petal"></div><div class="peony-petal"></div><div class="peony-petal"></div>
                <div class="peony-petal"></div><div class="core"></div>
            </div>

        </div>
    </div>

    <!-- Cinematic Sparkles -->
    <div class="particles" id="particles"></div>

    <script>
        // Generate organic fireflies
        const container = document.getElementById('particles');
        const count = 70; // High particle count for the wow factor

        for (let i = 0; i < count; i++) {
            let p = document.createElement('div');
            p.classList.add('particle');
            
            // Randomize size, position, and speed
            let size = Math.random() * 4 + 2; 
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 8 + 6) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            
            // Add slight blur to background particles for depth
            if (size < 3) p.style.filter = 'blur(2.5px)';
            
            container.appendChild(p);
        }
    </script>
</body>
</html>
