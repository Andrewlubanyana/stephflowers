<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>For Steph</title>
<style>
    /* Reset & Deep Canvas */
    * { box-sizing: border-box; }
    body, html {
        margin: 0; padding: 0; height: 100vh; width: 100vw;
        background: radial-gradient(ellipse at bottom, #2b0404 0%, #050000 100%);
        overflow: hidden;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Cinematic Intro Overlay */
    .fade-in-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 100;
        animation: clearOverlay 2s ease-in forwards;
        pointer-events: none;
    }
    @keyframes clearOverlay { to { opacity: 0; visibility: hidden; } }

    /* The glowing message bubbles - Desktop Base */
    .message {
        position: absolute;
        border: 2px solid #ff1a1a;
        border-radius: 50px;
        padding: 12px 25px;
        color: #fff;
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        background: rgba(20, 0, 0, 0.6);
        box-shadow: 0 0 15px #ff1a1a, inset 0 0 10px #ff1a1a, 0 0 30px rgba(255, 0, 0, 0.4);
        backdrop-filter: blur(5px);
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
        z-index: 20;
        text-align: center;
        white-space: nowrap;
        opacity: 0;
        animation: floatMsg 4s ease-in-out infinite alternate, fadeInMsg 1.5s ease-out forwards;
    }

    /* Staggered load times for messages (Desktop layout) */
    .msg1 { top: 15%; left: 10%; animation-delay: 1.0s, 1.0s; }
    .msg2 { top: 25%; right: 10%; animation-delay: 1.5s, 1.5s; animation-direction: alternate-reverse; }
    .msg3 { bottom: 35%; left: 8%; animation-delay: 2.0s, 2.0s; }
    .msg4 { bottom: 25%; right: 8%; animation-delay: 2.5s, 2.5s; animation-direction: alternate-reverse; }

    .heart { color: #ff3333; text-shadow: 0 0 10px #ff0000; animation: heartbeat 1.5s infinite; display: inline-block; }

    @keyframes floatMsg { 0% { transform: translateY(0px); } 100% { transform: translateY(-12px); } }
    @keyframes fadeInMsg { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }
    @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }

    /* Scene Container */
    .scene {
        position: absolute; bottom: 0; left: 50%;
        transform: translateX(-50%);
        width: 100vw; height: 60vh;
        display: flex; justify-content: center; align-items: flex-end;
        z-index: 10;
    }

    /* Grass Foreground */
    .grass {
        position: absolute; bottom: -20px; width: 120vw; height: 150px;
        background: radial-gradient(ellipse at top, #004d22 0%, transparent 70%);
        filter: blur(4px); opacity: 0.6; z-index: 1;
    }

    /* 3-Flower Cluster */
    .flower-cluster {
        position: relative; width: 400px; height: 500px;
        display: flex; justify-content: center; align-items: flex-end;
        z-index: 5;
        transform-origin: bottom center;
        animation: growBouquet 2s ease-out forwards;
    }
    @keyframes growBouquet { from { transform: scale(0) translateY(200px); } to { transform: scale(1) translateY(0); } }

    /* Stems */
    .stem { position: absolute; bottom: 0; border-radius: 50px; box-shadow: 0 0 20px #00ff88; }
    .stem.center { width: 10px; height: 350px; background: linear-gradient(to top, #002200, #00ff88); left: 195px; animation: swayCenter 6s ease-in-out infinite alternate; transform-origin: bottom center; }
    .stem.left { width: 8px; height: 260px; background: linear-gradient(to top, #002200, #00e676); left: 140px; transform: rotate(-25deg); transform-origin: bottom center; animation: swayLeft 5s ease-in-out infinite alternate; }
    .stem.right { width: 8px; height: 280px; background: linear-gradient(to top, #002200, #00e676); left: 250px; transform: rotate(20deg); transform-origin: bottom center; animation: swayRight 5.5s ease-in-out infinite alternate; }

    /* Leaves */
    .leaf { position: absolute; background: linear-gradient(45deg, #004d22, #00ff88); box-shadow: 0 0 15px #00cc66; }
    .leaf-left { width: 80px; height: 40px; border-radius: 50% 0 50% 0; left: -75px; top: 40%; transform: rotate(-30deg); }
    .leaf-right { width: 80px; height: 40px; border-radius: 0 50% 0 50%; right: -75px; top: 55%; transform: rotate(30deg); }

    /* Blooms */
    .bloom { position: absolute; width: 0; height: 0; transform-origin: center; animation: bloomOpen 1.5s ease-out 1s forwards; }
    .center-bloom { top: -40px; left: -45px; }
    .left-bloom { top: -35px; left: -35px; transform: scale(0.8); }
    .right-bloom { top: -35px; left: -35px; transform: scale(0.85); }

    @keyframes bloomOpen { to { width: 100px; height: 100px; } }

    /* Petals */
    .petal {
        position: absolute; width: 45px; height: 95px;
        background: radial-gradient(circle at bottom, #ff5500, #ff0044);
        border-radius: 50% 50% 10% 10%;
        box-shadow: 0 0 20px #ff1a1a, inset 0 0 15px rgba(255, 255, 255, 0.3);
        top: -45px; left: 27px; transform-origin: bottom center;
        opacity: 0.95;
    }
    
    .petal:nth-child(1) { transform: rotate(0deg); }
    .petal:nth-child(2) { transform: rotate(50deg); }
    .petal:nth-child(3) { transform: rotate(-50deg); }
    .petal:nth-child(4) { transform: rotate(100deg); }
    .petal:nth-child(5) { transform: rotate(-100deg); }

    /* Glowing Core */
    .core {
        position: absolute; width: 35px; height: 35px;
        background: radial-gradient(circle, #ffffff, #ffcc00, #ff3300);
        border-radius: 50%; top: 32px; left: 32px;
        box-shadow: 0 0 25px #ffff99, 0 0 40px #ff6600, inset 0 0 10px #ffffff;
        z-index: 5;
    }

    /* Organic Swaying Animations */
    @keyframes swayCenter { 0% { transform: rotate(-3deg); } 100% { transform: rotate(3deg); } }
    @keyframes swayLeft { 0% { transform: rotate(-28deg); } 100% { transform: rotate(-22deg); } }
    @keyframes swayRight { 0% { transform: rotate(17deg); } 100% { transform: rotate(23deg); } }

    /* Magical Fireflies */
    .particles { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 15; }
    .particle {
        position: absolute; background: #ffcc00; border-radius: 50%;
        box-shadow: 0 0 10px #ffcc00, 0 0 20px #ff5500;
        animation: fly infinite linear;
    }
    @keyframes fly {
        0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
        20% { opacity: 1; transform: translateY(80vh) translateX(-20px) scale(1); }
        80% { opacity: 1; transform: translateY(20vh) translateX(20px) scale(1); }
        100% { transform: translateY(-10vh) translateX(-10px) scale(0); opacity: 0; }
    }

    /* 📱 MOBILE RESPONSIVENESS (Layout Engine completely rewritten) */
    @media (max-width: 768px) {
        .flower-cluster { 
            transform: scale(0.65); /* Keeps flowers appropriately sized */
            bottom: -30px; 
        }
        @keyframes growBouquet { from { transform: scale(0) translateY(100px); } to { transform: scale(0.65) translateY(0); } }
        
        .message { 
            font-size: 0.95rem; 
            padding: 12px 15px; 
            white-space: normal; /* Enables multi-line wrapping */
            line-height: 1.4;
        }

        /* Top Center */
        .msg1 { 
            top: 10%; 
            left: 50%; 
            transform: translateX(-50%); 
            width: max-content;
            max-width: 75vw;
            animation: fadeInMsgCentered 1.5s ease forwards, floatMsgCentered 4s ease-in-out infinite alternate; 
            animation-delay: 1s, 1s; 
        }
        
        /* Middle Left (Side by side) */
        .msg2 { 
            top: 26%; 
            left: 4vw; 
            right: auto;
            width: 44vw; 
            animation: fadeInMsg 1.5s ease forwards, floatMsg 4.5s ease-in-out infinite alternate-reverse; 
            animation-delay: 1.5s, 1.5s; 
        }
        
        /* Middle Right (Side by side) */
        .msg4 { 
            top: 26%; 
            right: 4vw; 
            left: auto;
            width: 44vw; 
            animation: fadeInMsg 1.5s ease forwards, floatMsg 4s ease-in-out infinite alternate; 
            animation-delay: 2.5s, 2.5s; 
        }

        /* Bottom Center (Hovers right above flowers) */
        .msg3 { 
            bottom: 34%; 
            left: 50%; 
            transform: translateX(-50%); 
            width: max-content;
            max-width: 85vw;
            animation: fadeInMsgCentered 1.5s ease forwards, floatMsgCentered 4.5s ease-in-out infinite alternate-reverse; 
            animation-delay: 2s, 2s; 
        }
    }

    /* Special keyframes needed to maintain the -50% centering on mobile while floating */
    @keyframes fadeInMsgCentered { 
        from { opacity: 0; transform: translate(-50%, 20px); } 
        to { opacity: 1; transform: translate(-50%, 0); } 
    }
    @keyframes floatMsgCentered { 
        0% { transform: translate(-50%, 0px); } 
        100% { transform: translate(-50%, -10px); } 
    }

</style>
</head>
<body>

    <div class="fade-in-overlay"></div>

    <!-- Floating Messages perfectly structured for Steph -->
    <div class="message msg1">Steph❤️, here are the flowers for you</div>
    <div class="message msg2">I'm still not lucky enough to bring em in person</div>
    <div class="message msg3">... but i hope they make you smile <span class="heart"></span></div>
   

    <!-- The 3-Flower Bouquet Scene -->
    <div class="scene">
        <div class="grass"></div>
        <div class="flower-cluster">
            
            <!-- Left Small Flower -->
            <div class="stem left">
                <div class="leaf leaf-left"></div>
                <div class="bloom left-bloom">
                    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
                    <div class="petal"></div><div class="petal"></div><div class="core"></div>
                </div>
            </div>

            <!-- Right Small Flower -->
            <div class="stem right">
                <div class="leaf leaf-right"></div>
                <div class="bloom right-bloom">
                    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
                    <div class="petal"></div><div class="petal"></div><div class="core"></div>
                </div>
            </div>

            <!-- Center Main Flower -->
            <div class="stem center">
                <div class="leaf leaf-left" style="top: 30%"></div>
                <div class="leaf leaf-right" style="top: 60%"></div>
                <div class="bloom center-bloom">
                    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
                    <div class="petal"></div><div class="petal"></div><div class="core"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- Cinematic Sparkles -->
    <div class="particles" id="particles"></div>

    <script>
        // Generate organic fireflies
        const container = document.getElementById('particles');
        const count = 60; // More particles for the wow factor

        for (let i = 0; i < count; i++) {
            let p = document.createElement('div');
            p.classList.add('particle');
            
            // Randomize size, position, and speed
            let size = Math.random() * 4 + 2; 
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 8 + 5) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            
            // Add slight blur to background particles for depth
            if (size < 3) p.style.filter = 'blur(2px)';
            
            container.appendChild(p);
        }
    </script>
</body>
</html>
